name: Lint Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'eslint.config.mjs'
      - '.prettierrc'
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'eslint.config.mjs'
      - '.prettierrc'

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint (affected only)
        run: pnpm nx affected --target=lint --base=origin/main --head=HEAD
