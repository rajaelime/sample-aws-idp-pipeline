name: Lint Fix

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'eslint.config.mjs'
      - '.prettierrc'

jobs:
  lint-fix:
    name: Auto Fix Lint & Prettier
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint fix
        run: pnpm nx run-many --target=lint --all --configuration=fix
        continue-on-error: true

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "style: auto lint fix [skip ci]"
          git push
